name: install-test

# Free on this public repo (standard GitHub-hosted runners, incl. macOS).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, cheap checks: the settings-merge unit test + the no-op flags.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: settings-merge smoke test
        run: bash tests/install_test.sh
      - name: --check / --help make no changes and exit 0
        run: |
          bash install.sh --check
          bash install.sh --help

  # The real thing: on a clean macOS runner, run the FULL installer so the
  # dependency-install + build + dedicated-bin (~/.smart-rg/bin) + Claude-config
  # paths actually execute (the branches we can't easily exercise on a dev box that already
  # has everything). The runner has Homebrew + Rust preinstalled; ast-grep is
  # typically absent, so the `brew install ast-grep` branch gets tested.
  macos-install:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: settings-merge smoke test
        run: bash tests/install_test.sh
      - name: preview deps (no changes)
        run: bash install.sh --check
      - name: full install (deps + build + symlink + Claude config)
        run: bash install.sh
      - name: verify the install produced a working tool
        run: |
          set -euo pipefail
          test -x "$HOME/.smart-rg/bin/rg"          # shim binary in the dedicated dir
          test -L "$HOME/.smart-rg/bin/rg2"         # real-rg symlink created
          test -f "$HOME/.smart-rg/env.sh"          # PATH drop-in written
          "$HOME/.smart-rg/bin/rg" stats            # shim runs without error
          command -v ast-grep                       # runtime dep present
          python3 -c "import json,os; \
            d=json.load(open(os.path.expanduser('~/.claude/settings.json'))); \
            assert d['env']['USE_BUILTIN_RIPGREP']=='0', d"
      - name: uninstall removes everything cleanly
        run: |
          set -euo pipefail
          bash install.sh --uninstall --purge
          test ! -e "$HOME/.smart-rg/bin/rg"        # shim gone
          test ! -e "$HOME/.smart-rg/bin/rg2"       # symlink gone
          test ! -e "$HOME/.smart-rg/env.sh"        # PATH drop-in gone
          test ! -e "$HOME/.smart-rg"               # data dir purged, no orphans
          echo "uninstall clean ✓"
